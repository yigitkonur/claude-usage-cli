name: Release

'on':
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-13
            arch: x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: uv pip install --system pyinstaller curl-cffi

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name "claude-usage-macos-${{ matrix.arch }}" \
            --hidden-import curl_cffi \
            --hidden-import curl_cffi.requests \
            --noupx \
            assets/claude-usage.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-macos-${{ matrix.arch }}
          path: dist/claude-usage-macos-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Compute SHA256 checksums
        run: |
          cd dist
          find . -name 'claude-usage-*' -type f | sort | while read f; do
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/claude-usage-macos-arm64/claude-usage-macos-arm64
            dist/claude-usage-macos-x86_64/claude-usage-macos-x86_64
            dist/SHA256SUMS

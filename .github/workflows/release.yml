name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14     # Apple Silicon (arm64)
            arch: arm64
          - os: macos-13     # Intel (x86_64)
            arch: x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python 3.12
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: uv pip install --system pyinstaller curl-cffi

      - name: Build binary
        run: |
          pyinstaller \
            --onefile \
            --name "claude-usage-macos-${{ matrix.arch }}" \
            --hidden-import curl_cffi \
            --hidden-import curl_cffi.requests \
            --noupx \
            assets/claude-usage.py

      # ── Code-signing + notarization ────────────────────────────────────────
      # Runs automatically when MACOS_CERTIFICATE secret is set.
      # Required GitHub secrets:
      #   MACOS_CERTIFICATE       - base64-encoded Developer ID .p12 certificate
      #   MACOS_CERTIFICATE_PWD   - password for the .p12
      #   APPLE_SIGNING_IDENTITY  - "Developer ID Application: Name (TEAMID)"
      #   APPLE_ID                - your Apple ID email
      #   APPLE_APP_PASSWORD      - app-specific password from appleid.apple.com
      #   APPLE_TEAM_ID           - 10-character Team ID
      # ─────────────────────────────────────────────────────────────────────

      - name: Import signing certificate
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/certificate.p12

      - name: Code-sign binary
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        run: |
          codesign --force \
            --sign "${{ secrets.APPLE_SIGNING_IDENTITY }}" \
            --options runtime \
            --entitlements entitlements.plist \
            "dist/claude-usage-macos-${{ matrix.arch }}"
          codesign --verify --verbose "dist/claude-usage-macos-${{ matrix.arch }}"

      - name: Notarize binary
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -c -k --keepParent \
            "dist/claude-usage-macos-${{ matrix.arch }}" \
            /tmp/notarize.zip
          xcrun notarytool submit /tmp/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/claude-usage-macos-${{ matrix.arch }}"
          xcrun stapler validate "dist/claude-usage-macos-${{ matrix.arch }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-usage-macos-${{ matrix.arch }}
          path: dist/claude-usage-macos-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Compute SHA256 checksums
        run: |
          cd dist
          find . -name 'claude-usage-*' -type f | sort | while read f; do
            sha256sum "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/claude-usage-macos-arm64/claude-usage-macos-arm64
            dist/claude-usage-macos-x86_64/claude-usage-macos-x86_64
            dist/SHA256SUMS
